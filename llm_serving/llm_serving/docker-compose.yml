# ==============================================================
#  LLM Serving Stack — docker-compose.yml
#
#  Model loading flow:
#    Local files → model-uploader → MinIO (s3://models/gemma-1b-finetune/)
#    MinIO → model-sync (mc mirror) → shared Docker volume "model_weights"
#    SGLang / vLLM → load from /model in shared volume (NOT local mount)
#
#  Port map (no conflict with existing cole_labs setup):
#    minio        : 9100 (S3 API), 9101 (console)
#    sglang       : 30002
#    vllm         : 30003
#    litellm      : 4001
#    litellm-db   : 5433
#    redis        : 6380
#    prometheus   : 9091
#    grafana      : 3000
#    node-exporter: 9100 (internal only)
#    dcgm-exporter: 9400
#    redis-exp    : 9121
#
#  GPU: uses deploy.resources.reservations.devices (Compose v2, no runtime: nvidia)
#  Prerequisites: nvidia-container-toolkit + docker restarted
#    → sudo bash scripts/install_gpu_docker.sh
# ==============================================================

networks:
  llmserving:
    driver: bridge

volumes:
  minio_serving_data:
  model_weights:            # shared volume: MinIO → SGLang/vLLM
  litellm_serving_pg_data:
  redis_serving_data:
  prometheus_serving_data:
  grafana_serving_data:
  mlflow_serving_data:

x-minio-creds: &minio-creds
  AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
  AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
  AWS_ENDPOINT_URL: http://minio:9000
  AWS_DEFAULT_REGION: us-east-1
  S3_ENDPOINT_URL: http://minio:9000

x-gpu-resources: &gpu-resources
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

services:

  # ============================================================
  # 1. MinIO  — S3-compatible model registry
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: llms_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - minio_serving_data:/data
    networks:
      - llmserving
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ============================================================
  # 2. MinIO init — create bucket
  # ============================================================
  minio-init:
    image: minio/mc:latest
    container_name: llms_minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-models}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/$$MINIO_BUCKET &&
        mc anonymous set none local/$$MINIO_BUCKET &&
        echo 'Bucket ready: '$$MINIO_BUCKET
      "
    networks:
      - llmserving
    restart: "no"

  # ============================================================
  # 3. Model uploader — push local finetuned model to MinIO
  #    Source: ../gemma-1b-finetune (host)
  #    Dest  : s3://models/gemma-1b-finetune/
  # ============================================================
  model-uploader:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.uploader
    container_name: llms_model_uploader
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-models}
      MODEL_SRC_DIR: /model-src
      MODEL_PREFIX: ${MODEL_PATH_IN_MINIO:-gemma-1b-finetune}
    volumes:
      - ../gemma-1b-finetune:/model-src:ro
    networks:
      - llmserving
    restart: "no"

  # ============================================================
  # 4. Model sync — pull model from MinIO → shared Docker volume
  #    This decouples inference servers from the host filesystem.
  #    Both SGLang and vLLM read from the "model_weights" volume.
  # ============================================================
  model-sync:
    image: minio/mc:latest
    container_name: llms_model_sync
    depends_on:
      model-uploader:
        condition: service_completed_successfully
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-models}
      MODEL_PREFIX: ${MODEL_PATH_IN_MINIO:-gemma-1b-finetune}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        echo 'Syncing model from MinIO s3://$$MINIO_BUCKET/$$MODEL_PREFIX/ ...' &&
        mc mirror --overwrite local/$$MINIO_BUCKET/$$MODEL_PREFIX /model/ &&
        echo 'Model sync complete.' && ls -lh /model/
      "
    volumes:
      - model_weights:/model
    networks:
      - llmserving
    restart: "no"

  # ============================================================
  # 5. SGLang — OpenAI-compatible inference server
  #    Model source: model_weights volume (synced from MinIO)
  # ============================================================
  sglang:
    image: lmsysorg/sglang:latest
    container_name: llms_sglang
    restart: unless-stopped
    environment:
      <<: *minio-creds
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      # VRAM tuning (forwarded to scripts/sglang_entrypoint.sh)
      SGLANG_MAX_RUNNING_REQUESTS: ${SGLANG_MAX_RUNNING_REQUESTS:-32}
      SGLANG_CHUNKED_PREFILL_SIZE: ${SGLANG_CHUNKED_PREFILL_SIZE:-2048}
      SGLANG_CONTEXT_LENGTH: ${SGLANG_CONTEXT_LENGTH:-4096}
      SGLANG_MAX_PREFILL_TOKENS: ${SGLANG_MAX_PREFILL_TOKENS:-4096}
      SGLANG_MEM_FRACTION_STATIC: ${SGLANG_MEM_FRACTION_STATIC:-0.32}
    depends_on:
      model-sync:
        condition: service_completed_successfully
    volumes:
      - model_weights:/model:ro
      - ./scripts/sglang_entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    ports:
      - "30002:30002"
    networks:
      - llmserving
    <<: *gpu-resources
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:30002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ============================================================
  # 6. vLLM — alternative inference
  #    Model source: model_weights volume (synced from MinIO)
  #    Start: docker compose up -d (enabled by default)
  # ============================================================
  vllm:
    image: vllm/vllm-openai:latest
    container_name: llms_vllm
    restart: unless-stopped
    environment:
      <<: *minio-creds
      NVIDIA_VISIBLE_DEVICES: "${VLLM_GPU_DEVICE:-0}"
      VLLM_GPU_MEM: ${VLLM_GPU_MEM:-0.34}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    depends_on:
      model-sync:
        condition: service_completed_successfully
    volumes:
      - model_weights:/model:ro
    command: >
      bash -lc 'echo "[vLLM] Config: gpu-memory-utilization=$VLLM_GPU_MEM max-model-len=4096 max-num-seqs=32"; exec
      vllm serve
      --model /model
      --served-model-name gemma-1b-finetune
      --port 30003
      --host 0.0.0.0
      --gpu-memory-utilization $VLLM_GPU_MEM
      --max-model-len 4096
      --max-num-seqs 32
      --enable-prefix-caching
      --dtype auto
      --trust-remote-code'
    ports:
      - "30003:30003"
    networks:
      - llmserving
    <<: *gpu-resources
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:30003/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ============================================================
  # 7. Redis — LiteLLM cache
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: llms_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - redis_serving_data:/data
    networks:
      - llmserving
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # 8. Postgres — LiteLLM request log DB
  # ============================================================
  litellm-db:
    image: postgres:16-alpine
    container_name: llms_litellm_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-litellm_serving}
      POSTGRES_USER: ${POSTGRES_USER:-litellm_serving}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-servingpass9090}
    ports:
      - "5433:5432"
    volumes:
      - litellm_serving_pg_data:/var/lib/postgresql/data
    networks:
      - llmserving
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB:-litellm_serving} -U ${POSTGRES_USER:-litellm_serving}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ============================================================
  # 9. LiteLLM — OpenAI-compatible proxy (port 4001)
  # ============================================================
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: llms_litellm
    restart: unless-stopped
    depends_on:
      litellm-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      # NOTE: sglang dependency removed so litellm doesn't block on GPU model load
      # LiteLLM will retry sglang on first request automatically
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4001", "--num_workers", "4"]
    ports:
      - "4001:4001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # env_file loads .env so all variables are available directly in the container
    env_file:
      - .env
    environment:
      # Hardcoded DATABASE_URL avoids Prisma receiving un-expanded ${VAR} literals
      DATABASE_URL: "postgresql://litellm_serving:servingpass9090@litellm-db:5432/litellm_serving"
      STORE_MODEL_IN_DB: "True"
      # These are read from .env via env_file above
      # LITELLM_MASTER_KEY, LITELLM_SALT_KEY, UI_USERNAME, UI_PASSWORD,
      # REDIS_PASSWORD are all loaded automatically
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    networks:
      - llmserving
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4001/health/liveliness')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ============================================================
  # 10. Node Exporter — host CPU/RAM/disk metrics
  # ============================================================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: llms_node_exporter
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro,rslave
    ports:
      - "9102:9100"
    networks:
      - llmserving
    pid: host

  # ============================================================
  # 11. DCGM Exporter — GPU metrics
  # ============================================================
  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.6-3.4.2-ubuntu22.04
    container_name: llms_dcgm_exporter
    restart: unless-stopped
    environment:
      NVIDIA_VISIBLE_DEVICES: all
    ports:
      - "9400:9400"
    networks:
      - llmserving
    cap_add:
      - SYS_ADMIN
    <<: *gpu-resources

  # ============================================================
  # 12. Redis Exporter — Redis metrics
  # ============================================================
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: llms_redis_exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "9121:9121"
    networks:
      - llmserving
    depends_on:
      - redis

  # ============================================================
  # 13. Prometheus — metrics aggregation
  # ============================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: llms_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_serving_data:/prometheus
    ports:
      - "9091:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - llmserving

  # ============================================================
  # 14. Grafana — dashboards (auto-provisioned)
  # ============================================================
  grafana:
    image: grafana/grafana:latest
    container_name: llms_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/llm_serving_overview.json
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-piechart-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana_serving_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - llmserving

  # ============================================================
  # 15. MLflow — Experiment tracking and model registry
  # ============================================================
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    container_name: llms_mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
      AWS_DEFAULT_REGION: us-east-1
    command: >
      sh -c "pip install boto3 && mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root s3://${MINIO_BUCKET:-models}/mlflow
      --serve-artifacts
      --host 0.0.0.0"
    volumes:
      - mlflow_serving_data:/mlflow
    networks:
      - llmserving
    depends_on:
      minio:
        condition: service_healthy
